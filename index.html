<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#FDFBF7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="description" content="Kaprao52 - สั่งอาหารออนไลน์จากร้านกะเพรา52 อร่อยทุกเมนู สดใหม่ทุกวัน" />

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/jpeg" href="assets/icons/icon-192x192.png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />

  <!-- Google Analytics -->
  <script>
    // Only load GA if ID is configured
    const gaId = '%VITE_GA_ID%';
    if (gaId && !gaId.includes('VITE_GA_ID')) {
      const script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
      document.head.appendChild(script);

      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      gtag('js', new Date());
      gtag('config', gaId);
    }
  </script>

  <title>Kaprao52 - กะเพราอร่อย</title>

  <style>
    /* Critical CSS for initial load */
    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: #FAFAF9;
    }

    #root {
      min-height: 100vh;
    }

    /* Premium splash screen */
    .loading-container {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #FFFBF5 0%, #FFF5EB 50%, #FAFAF9 100%);
      z-index: 9999;
      gap: 0;
    }

    .loading-logo-wrap {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .loading-pulse {
      position: absolute;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255, 107, 0, 0.15);
      animation: pulse-loader 1.8s ease-out infinite;
    }

    .loading-pulse2 {
      position: absolute;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255, 107, 0, 0.1);
      animation: pulse-loader 1.8s ease-out infinite 0.4s;
    }

    .loading-logo {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(135deg, #FF6B00 0%, #FF8C42 50%, #FFB347 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 35px -6px rgba(255, 107, 0, 0.55);
      animation: logo-float 2.5s ease-in-out infinite;
      font-family: 'Kanit', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      color: white;
      letter-spacing: -1px;
    }

    .loading-brand {
      font-family: 'Kanit', sans-serif;
      font-weight: 900;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      line-height: 1;
      background: linear-gradient(135deg, #1C1917, #44403C);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-brand span {
      background: linear-gradient(135deg, #FF6B00, #FF8C42);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
      margin-top: 24px;
    }

    .loading-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #FF6B00;
      opacity: 0.3;
    }

    .loading-dot:nth-child(1) {
      animation: dot-pulse 1.4s ease-in-out 0s infinite;
    }

    .loading-dot:nth-child(2) {
      animation: dot-pulse 1.4s ease-in-out 0.2s infinite;
    }

    .loading-dot:nth-child(3) {
      animation: dot-pulse 1.4s ease-in-out 0.4s infinite;
    }

    @keyframes pulse-loader {
      0% {
        transform: scale(0.8);
        opacity: 0.6;
      }

      50% {
        opacity: 0.2;
      }

      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    @keyframes logo-float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-6px);
      }
    }

    @keyframes dot-pulse {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(0.8);
      }

      50% {
        opacity: 1;
        transform: scale(1.2);
        background: #FF6B00;
      }
    }
  </style>
</head>

<body>
  <div id="root">
    <!-- Premium splash screen while React loads -->
    <div class="loading-container">
      <div class="loading-logo-wrap">
        <div class="loading-pulse"></div>
        <div class="loading-pulse2"></div>
        <div class="loading-logo">K</div>
      </div>
      <div class="loading-brand">KAPRAO<span>52</span></div>
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>
  </div>
  <script type="module" src="src/main.tsx"></script>
</body>

</html>
