<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Kaprao52</title>
    <script type="text/javascript">
        // Single Page Apps for GitHub Pages
        // MIT License
        // https://github.com/rafgraph/spa-github-pages
        // This script checks to see if a redirect is present in the query string,
        // converts it back into the correct url and adds it to the
        // browser's history using window.history.replaceState(...),
        // which unsubstitutes the window.location.search and window.location.hash
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) {
                    return s.replace(/~and~/g, '&')
                }).join('?');
                window.history.replaceState(null, null,
                    l.pathname.slice(0, l.pathname.lastIndexOf('/')) + decoded + l.hash
                );
            }
        }(window.location))
    </script>
    <script type="text/javascript">
        // If the page is not found, redirect to index.html with the current path as a query string
        // This is a simplified version of the above for a quick fix
        var path = window.location.pathname;
        if (path.includes('/Kaprao-app/')) {
            window.location.href = '/Kaprao-app/index.html?p=' + path.replace('/Kaprao-app/', '');
        } else {
            window.location.href = '/Kaprao-app/';
        }
    </script>
</head>

<body>
</body>

</html>
